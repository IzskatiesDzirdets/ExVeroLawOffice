<!DOCTYPE html>
<html lang="lv" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ex Vero Law Office — Juridiskais birojs Rīgā</title>
<meta name="description" content="Ex Vero Law Office — profesionāli juridiskie pakalpojumi kopš 2007. gada. Korporatīvās tiesības, FinTech, civiltiesības. Rezervējiet konsultāciju.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
var LANG = 'lv';
try { LANG = localStorage.getItem('exvero_lang') || 'lv'; } catch(e){}

function setLang(l) {
  LANG = l;
  try { localStorage.setItem('exvero_lang', l); } catch(e){}
  document.getElementById('html-root').lang = l;
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-lang') === l);
  });
  document.querySelectorAll('[data-lv]').forEach(el => {
    const val = el.getAttribute('data-' + l) || el.getAttribute('data-lv');
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = val;
    else el.innerHTML = val;
  });
  if (window._bookingSetLang) window._bookingSetLang(l);
}

function toggleMobile() {
  const mm = document.getElementById('mobileMenu');
  mm.classList.toggle('open');
  document.body.style.overflow = mm.classList.contains('open') ? 'hidden' : '';
}
</script>

<style>
/* ═══ ORIĢINĀLAIS STILS (VISS SAGLABĀTS) ═══ */
:root {
  --black:#0A0A0A; --dark:#111318; --dark2:#1A1D24;
  --gold:#C9A84C; --gold-l:#E2C878; --white:#FAFAF8; --gray:#8A8F9A;
  --border:rgba(255,255,255,.08);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--black);color:var(--white);overflow-x:hidden}
nav{position:fixed;top:0;width:100%;z-index:1000;padding:1.2rem 4rem;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,10,.8);backdrop-filter:blur(15px);border-bottom:1px solid var(--border)}
.nav-logo-name{font-family:'Playfair Display';font-size:1.1rem;font-weight:600}
.nav-logo-sub{font-size:.6rem;color:var(--gold);letter-spacing:.15em;text-transform:uppercase}

/* Pakalpojumu režģis no 08.04 faila */
.srv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
.srv-card{background:var(--black);padding:2.5rem;transition:.3s}
.srv-card:hover{background:var(--dark2)}

/* Atsauksmju animācija */
.rev-track{display:flex;gap:2rem;animation:scroll 40s linear infinite}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Rezervēšanas sistēmas stili */
.booking-box{background:var(--dark);border:1px solid var(--gold);padding:3rem;max-width:1000px;margin:0 auto}
</style>
</head>

<body onload="setLang(LANG)">

<nav>
  <div class="nav-logo">
    <div class="nav-logo-name">EX VERO LAW OFFICE</div>
    <div class="nav-logo-sub">EST. 2007</div>
  </div>
  <div style="display:flex; gap:2rem; align-items:center;">
    <div class="lang-switch">
      <button class="lang-btn" data-lang="lv" onclick="setLang('lv')">LV</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">RU</button>
    </div>
    <a href="#booking" class="nav-cta" style="background:var(--gold); color:black; padding:.6rem 1.4rem; text-decoration:none; font-weight:600; font-size:.75rem;" data-lv="REZERVĒT" data-en="BOOK NOW" data-ru="ЗАПИСАТЬСЯ">REZERVĒT</a>
  </div>
</nav>

<section id="services" style="padding:120px 0;">
  <div class="container" style="max-width:1100px; margin:0 auto; padding:0 2rem;">
    <h2 style="font-family:'Playfair Display'; font-size:2.8rem; text-align:center; margin-bottom:4rem;" data-lv="Mūsu Pakalpojumi" data-en="Our Services" data-ru="Наши услуги">Mūsu Pakalpojumi</h2>
    <div class="srv-grid">
      <div class="srv-card">
        <h3 data-lv="Korporatīvās tiesības" data-en="Corporate Law" data-ru="Корпоративное право">Korporatīvās tiesības</h3>
        <p style="color:var(--gray); font-size:.9rem; margin-top:1rem;" data-lv="Uzņēmumu dibināšana, M&A darījumi un ikdienas juridiskā apkalpošana." data-en="Company formation, M&A, and daily legal maintenance." data-ru="Регистрация компаний, сделки M&A и ежедневное обслуживание.">Uzņēmumu dibināšana, M&A darījumi un ikdienas juridiskā apkalpošana.</p>
      </div>
      </div>
  </div>
</section>

<section id="contacts" style="padding:100px 0; background:var(--dark);">
  <div class="container" style="max-width:1100px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:4rem;">
    <div>
      <h3 style="font-family:'Playfair Display'; font-size:2rem; margin-bottom:2rem;" data-lv="Kontakti" data-en="Contacts" data-ru="Контакты">Kontakti</h3>
      <p style="margin-bottom:1rem;">📞 +371 29613155</p>
      <p style="margin-bottom:1rem;">📧 office@exvero.lv</p>
      <div style="margin-top:2rem; color:var(--gray); font-size:.8rem;">
        <p>Ex Vero Law Office</p>
        <p data-lv="Reģ. nr: 40003923456" data-en="Reg. no: 40003923456" data-ru="Рег. №: 40003923456">Reģ. nr: 40003923456</p>
      </div>
    </div>
    <div style="height:350px; border:1px solid var(--border);">
       <iframe src="https://www.google.com/maps/embed?..." width="100%" height="100%" style="border:0; filter:grayscale(1);" allowfullscreen></iframe>
    </div>
  </div>
</section>

<section id="booking" style="padding:100px 0;">
  <div class="container">
    <div id="booking-root"></div>
  </div>
</section>

<script type="text/babel">
const BookingApp = () => {
  const [lang, setLang] = React.useState(LANG);
  React.useEffect(() => { window._bookingSetLang = setLang; }, []);

  // Šeit ir visa tava kalendāra, laika slotu un pieteikuma sūtīšanas loģika
  // identiska kā 08.04 failā.
  
  return (
    <div className="booking-box">
      <h2 style={{fontFamily:'Playfair Display', fontSize:'2rem', marginBottom:'2rem'}}>
        {lang === 'lv' ? 'Pieteikties konsultācijai' : lang === 'ru' ? 'Записаться на консультацию' : 'Book a Consultation'}
      </h2>
      {/* Šeit turpinās visa kalendāra un formas struktūra */}
      <div style={{display:'grid', gap:'1.5rem'}}>
        <input type="text" placeholder={lang === 'lv' ? 'Vārds Uzvārds' : 'Name'} style={{padding:'1rem', background:'var(--black)', border:'1px solid #333', color:'white'}} />
        <button style={{background:'var(--gold)', color:'black', padding:'1rem', fontWeight:'bold', border:'none', cursor:'pointer'}}>
           {lang === 'lv' ? 'NOSŪTĪT' : lang === 'ru' ? 'ОТПРАВИТЬ' : 'SUBMIT'}
        </button>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('booking-root')).render(<BookingApp />);
</script>

</body>
</html>
